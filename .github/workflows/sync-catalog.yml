name: Sync Skills Catalog

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build catalog
        id: catalog
        run: |
          echo "SKILLS_CATALOG<<EOF" >> $GITHUB_OUTPUT
          { "updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)", "skills": [ && \
          find skills -name "SKILL.md" | while read f; do
            dir=$(dirname "$f" | sed 's|^skills/||')
            name=$(basename "$(dirname "$f")")
            desc=$(grep "^description:" "$f" | sed 's/^description: *//' | tr -d '"')
            echo "    {\"path\":\"$dir/$name\",\"name\":\"$name\",\"description\":\"$desc\"}," >> $GITHUB_OUTPUT
          done && \
          echo "    {}]}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit catalog
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "docs: auto-update skills catalog"
          git push
